name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        run: uv run mypy src/draftwright/

      - name: Codespell
        run: uv run codespell src/ tests/ docs/

  test:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # 3.10-3.12 resolve build123d 0.10 (cadquery-ocp + VTK); 3.13/3.14 resolve build123d
        # 0.11 (cadquery-ocp-novtk — VTK dropped, and the only kernel with 3.13/3.14 wheels).
        # A few exact-position snapshots are skipped on 0.11 (see tests/_kernel.py).
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        # Ubuntu/Python 3.12 is the canonical coverage job below. Excluding it
        # here keeps the OS/Python matrix complete without running it twice.
        exclude:
          - os: ubuntu-latest
            python-version: "3.12"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        # Fast tier only — the `slow` marker (heavy CTC fixture builds) is
        # deselected by default via addopts. The slow tier runs post-merge in the
        # `test-slow` job below.
        # `-n auto --dist loadscope`: run across all cores (#153). The suite is
        # build-bound and parallel-safe; loadscope keeps a class/module on one
        # worker so test ordering and module-scoped fixtures hold.
        # No --timeout here: it would override the 300 s set in
        # [tool.pytest.ini_options]. The heaviest test (full specimen-sheet SVG
        # export) can exceed 120 s on the slower macOS runners.
        # Coverage runs in CI; it is kept out of the default addopts so local
        # runs stay lean (see pyproject [tool.pytest.ini_options]).
        run: >-
          uv run pytest tests/ -n auto --dist loadscope
          --cov=src/draftwright
          --cov-report=term-missing

  coverage:
    # The fifteenth OS/Python matrix entry, split out so only the one job that
    # uploads to Codecov receives an OIDC token and renders retained reports.
    name: test (ubuntu-latest, 3.12)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with canonical coverage reports
        run: >-
          uv run pytest tests/ -n auto --dist loadscope
          --cov=src/draftwright
          --cov-report=term-missing
          --cov-report=xml
          --cov-report=html:htmlcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          # The repository's fail_under gate is authoritative; a third-party
          # service outage must not block an otherwise valid change.
          fail_ci_if_error: false
          use_oidc: true

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-linux-py3.12
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn
          retention-days: 14

  test-slow:
    # Heavy end-to-end CTC fixture builds (minutes each); run once, not across
    # the full OS/Python matrix.
    #
    # POST-MERGE ONLY — runs on push to main, not on pull_request, so it no
    # longer gates PR merge (#153). Rationale: since #149 pinned the fonts,
    # generated layout is deterministic, so these heavy real-part standards builds
    # rarely catch anything the PR fast tier misses. They stay as a safety net on
    # main; a regression here is caught right after merge.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run slow tests
        run: uv run pytest tests/ -m slow -n auto --dist loadscope
